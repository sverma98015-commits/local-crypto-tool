<!DOCTYPE html>
<html>
<head>
    <title>Local Crypto Tool</title>
</head>
<body>

<h1>Local Crypto Tool</h1>

<h2>AES-256 Encryption / Decryption</h2>

<form method="POST">

<textarea
name="text"
rows="10"
cols="80"></textarea>

<br><br>

<input
type="password"
name="password"
placeholder="Password">

<br><br>

<button name="action" value="encrypt">
Encrypt
</button>

<button name="action" value="decrypt">
Decrypt
</button>

</form>

<h3>Result</h3>

<textarea rows="10" cols="80">{{ result }}</textarea>

<hr>

<h2>SHA-256 File Hash Generator</h2>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="file">

<br><br>

<button name="action" value="hash">
Generate SHA-256
</button>

</form>

<h3>SHA-256 Hash</h3>

<textarea rows="5" cols="80">{{ file_hash }}</textarea>

</body>
</html>

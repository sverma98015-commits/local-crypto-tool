<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Crypto Tool</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-focus-border: rgba(99, 102, 241, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --accent-success: #10b981;
            --accent-success-hover: #059669;
            --accent-secondary: #3b82f6;
            --accent-secondary-hover: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 900px;
            margin-bottom: 32px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        main {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* Glass Tile Base */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* Inputs & Textareas */
        textarea, input[type="text"], input[type="password"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 14px;
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.5;
            transition: all 0.2s ease;
            resize: vertical;
        }

        textarea:focus, input[type="text"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        textarea[readonly] {
            background: rgba(0, 0, 0, 0.2);
            color: #cbd5e1;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            border-style: dashed;
        }

        /* Custom File Input Styling */
        .file-upload-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--glass-border);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        input[type="file"]::-webkit-file-upload-button {
            background: var(--glass-border);
            border: none;
            border-radius: 4px;
            color: var(--text-primary);
            padding: 6px 12px;
            margin-right: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        input[type="file"]::-webkit-file-upload-button:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Buttons & Actions Layout */
        .action-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        /* Specific Button Colors to break monotony */
        button[value="encrypt"] {
            background: var(--accent-primary);
            color: white;
        }
        button[value="encrypt"]:hover { background: var(--accent-hover); }

        button[value="decrypt"] {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }
        button[value="decrypt"]:hover { background: rgba(255, 255, 255, 0.08); }

        button[value="hash"] {
            background: var(--accent-secondary);
            color: white;
        }
        button[value="hash"]:hover { background: var(--accent-secondary-hover); }

        button[value="verify"] {
            background: var(--accent-success);
            color: white;
        }
        button[value="verify"]:hover { background: var(--accent-success-hover); }

        /* Results Display */
        .result-section {
            margin-top: 16px;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
        }

        .result-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <header>
        <h1>Local Crypto Tool</h1>
        <p class="subtitle">Secure, in-browser cryptographic utilities</p>
    </header>

    <main>
        <section class="glass-card">
            <h2>AES-256 Encryption / Decryption</h2>
            <form method="POST">
                <div class="form-group">
                    <label>Data Payload</label>
                    <textarea name="text" rows="6" placeholder="Enter plain text to encrypt or base64 encrypted data to decrypt..."></textarea>
                </div>

                <div class="form-group">
                    <label>Secret Passphrase</label>
                    <input type="password" name="password" placeholder="Enter secure password">
                </div>

                <div class="action-container">
                    <button type="submit" name="action" value="encrypt">Encrypt</button>
                    <button type="submit" name="action" value="decrypt">Decrypt</button>
                </div>
            </form>

            <div class="result-section">
                <div class="result-title">Output Result</div>
                <textarea rows="4" readonly placeholder="Output data will appear here...">{{ result }}</textarea>
            </div>
        </section>

        <section class="glass-card">
            <h2>SHA-256 File Hash Generator</h2>
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Target File</label>
                    <div class="file-upload-wrapper">
                        <input type="file" name="file">
                    </div>
                </div>

                <div class="action-container">
                    <button type="submit" name="action" value="hash">Generate SHA-256</button>
                </div>
            </form>

            <div class="result-section">
                <div class="result-title">Generated Checksum</div>
                <textarea rows="2" readonly placeholder="Hash identifier will appear here...">{{ file_hash }}</textarea>
            </div>
        </section>

        <section class="glass-card">
            <h2>File Integrity Verification</h2>
            <form method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Select File</label>
                    <div class="file-upload-wrapper">
                        <input type="file" name="verify_file">
                    </div>
                </div>

                <div class="form-group">
                    <label>Expected SHA-256 Hash</label>
                    <input type="text" name="expected_hash" placeholder="Paste the reference SHA-256 hash checksum here">
                </div>

                <div class="action-container">
                    <button type="submit" name="action" value="verify">Verify Integrity</button>
                </div>
            </form>

            <div class="result-section">
                <div class="result-title">Verification Diagnosis</div>
                <textarea rows="2" readonly placeholder="Status reports will display here...">{{ verification_result }}</textarea>
            </div>
        </section>
    </main>

</body>
</html>

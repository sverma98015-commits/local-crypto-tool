<!DOCTYPE html>
<html>
<head>
    <title>Cyber Crypto Tool</title>

    <style>
        body {
            background-color: #0b0f14;
            color: #00ff9d;
            font-family: monospace;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00ff9d;
        }

        .box {
            border: 1px solid #00ff9d;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            background-color: #111823;
        }

        textarea, input {
            width: 100%;
            background: black;
            color: #00ff9d;
            border: 1px solid #00ff9d;
            padding: 10px;
            font-family: monospace;
        }

        button {
            background: #00ff9d;
            color: black;
            padding: 10px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00cc7a;
        }

        .title {
            color: #00ff9d;
            font-size: 18px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<h1>🔐 CYBER CRYPTO TOOL</h1>

<!-- ENCRYPT / DECRYPT -->
<div class="box">

    <div class="title">AES-256 Encryption / Decryption</div>

    <form method="POST">

        <textarea name="text" rows="6" placeholder="Enter text or encrypted data"></textarea>

        <br><br>

        <input type="password" name="password" placeholder="Enter password">

        <button name="action" value="encrypt">ENCRYPT</button>
        <button name="action" value="decrypt">DECRYPT</button>

    </form>

    <br>

    <textarea rows="5" readonly>{{ result }}</textarea>

</div>

<!-- HASH -->
<div class="box">

    <div class="title">SHA-256 File Hash Generator</div>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="file">

        <button name="action" value="hash">GENERATE HASH</button>

    </form>

    <br>

    <textarea rows="3" readonly>{{ file_hash }}</textarea>

</div>

<!-- VERIFY -->
<div class="box">

    <div class="title">Integrity Verification System</div>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="verify_file">

        <br><br>

        <input type="text" name="expected_hash" placeholder="Paste expected SHA-256 hash">

        <button name="action" value="verify">VERIFY FILE</button>

    </form>

    <br>

    <textarea rows="2" readonly>{{ verification_result }}</textarea>

</div>

</body>
</html>
